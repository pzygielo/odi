name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Publish ${{ github.ref_name }}
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Check release tag
        run: |
          set -euo pipefail
          [[ "${RELEASE_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(M|RC)[0-9]+$|^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import signing key
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          gpg --batch --import-options import-local-sig \
            --import <(printf '%s' '${{ secrets.GPG_PRIVATE_KEY }}')
          gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --export-secret-keys --output secring.gpg
          chmod 600 secring.gpg
          gpg_key_id="$(
            gpg --batch --keyid-format short --with-colons --list-secret-keys |
              awk -F: '
                $1 == "ssb" && tolower($12) ~ /s/ { print $5; selected = 1; exit }
                $1 == "sec" && tolower($12) ~ /s/ && primary == "" { primary = $5 }
                END { if (!selected && primary != "") print primary }
              '
          )"
          test -n "${gpg_key_id}"

      - name: Run checks and publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          test -n "${SONATYPE_USERNAME}"
          test -n "${SONATYPE_PASSWORD}"
          gpg_key_id="$(
            gpg --batch --keyid-format short --with-colons --list-secret-keys |
              awk -F: '
                $1 == "ssb" && tolower($12) ~ /s/ { print $5; selected = 1; exit }
                $1 == "sec" && tolower($12) ~ /s/ && primary == "" { primary = $5 }
                END { if (!selected && primary != "") print primary }
              '
          )"
          gpg_key_id="${gpg_key_id: -8}"
          echo "Using signing key id with ${#gpg_key_id} characters"
          GPG_KEY_ID="${gpg_key_id}" ./gradlew publishToMavenCentral --publishing-type=AUTOMATIC \
            -PprojectVersion="${RELEASE_VERSION#v}" \
            -Psigning.keyId="${gpg_key_id}" \
            -Psigning.password="${GPG_PASSWORD}" \
            -Psigning.secretKeyRingFile="${PWD}/secring.gpg" \
            -Dorg.gradle.project.signing.keyId="${gpg_key_id}" \
            -Dorg.gradle.project.signing.password="${GPG_PASSWORD}" \
            -Dorg.gradle.project.signing.secretKeyRingFile="${PWD}/secring.gpg" \
            --stacktrace --no-daemon --continue

      - name: Generate documentation
        run: ./gradlew docs -PprojectVersion="${RELEASE_VERSION#v}" --no-daemon

      - name: Publish documentation to GitHub Pages
        uses: micronaut-projects/github-pages-deploy-action@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: build/docs
          version: ${{ github.event.release.tag_name }}

      - name: Package release artifacts
        run: tar -czf "odi-${RELEASE_VERSION}.tar.gz" --exclude=.git .

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: odi-${{ github.event.release.tag_name }}.tar.gz
